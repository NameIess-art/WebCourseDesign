server:
  port: 18080

spring:
  application:
    name: mall-backend
  datasource:
    url: jdbc:h2:file:./data/mall-db;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

app:
  jwt:
    secret: this-is-a-demo-secret-key-for-mall-system-2026
    expiration-seconds: 86400
